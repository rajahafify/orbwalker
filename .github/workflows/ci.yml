name: Godot CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Headless tests
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.3
      GODOT_BIN: ${{ runner.temp }}/godot/Godot_v4.6.3-stable_linux.x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tracked generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          tracked_artifacts="$(git ls-files | grep -E '(^Orbwalker\.apk$|\.apk$|\.aab$|\.apks$|\.idsig$|\.pyc$|\.pyo$|^build/|^\.godot/|^tmp/|^logs/|^android/|(^|/)__pycache__/)' || true)"
          if [[ -n "${tracked_artifacts}" ]]; then
            echo "Generated artifacts must not be tracked:"
            echo "${tracked_artifacts}"
            exit 1
          fi

      - name: Check changed-file whitespace
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            base_commit="$(git merge-base FETCH_HEAD HEAD)"
          else
            before_commit="${{ github.event.before }}"
            if [[ -z "${before_commit}" || "${before_commit}" =~ ^0+$ ]]; then
              base_commit="$(git rev-list --max-parents=0 HEAD)"
            else
              base_commit="${before_commit}"
            fi
          fi
          git diff --check "${base_commit}" HEAD

      - name: Check changed GDScript format and lint
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user pre-commit
          python3 -m pre_commit validate-config
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            base_commit="$(git merge-base FETCH_HEAD HEAD)"
          else
            before_commit="${{ github.event.before }}"
            if [[ -z "${before_commit}" || "${before_commit}" =~ ^0+$ ]]; then
              base_commit="$(git rev-list --max-parents=0 HEAD)"
            else
              base_commit="${before_commit}"
            fi
          fi
          mapfile -t changed_gd_files < <(git diff --name-only --diff-filter=ACMRT "${base_commit}" HEAD -- '*.gd')
          if [[ "${#changed_gd_files[@]}" -eq 0 ]]; then
            echo "No changed GDScript files to lint."
            exit 0
          fi
          python3 -m pre_commit run --show-diff-on-failure --files "${changed_gd_files[@]}"

      - name: Disable editor-only MCP runtime
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("project.godot")
          text = path.read_text(encoding="utf-8")
          text = text.replace('GDAIMCPRuntime="*res://scripts/core/gdai_mcp_runtime_proxy.gd"\n', "")
          text = text.replace('enabled=PackedStringArray("res://addons/gdai-mcp-plugin-godot/plugin.cfg")', "enabled=PackedStringArray()")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/godot"
          curl -L -o "${RUNNER_TEMP}/godot/godot.zip" "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "${RUNNER_TEMP}/godot/godot.zip" -d "${RUNNER_TEMP}/godot"
          chmod +x "${GODOT_BIN}"
          "${GODOT_BIN}" --version

      - name: Import project
        run: |
          "${GODOT_BIN}" --headless --path . --import --quit

      - name: Check script size budget and ratchet
        run: |
          "${GODOT_BIN}" --headless --path . --script res://tools/quality/script_size_budget.gd

      - name: Validate script loading
        run: |
          "${GODOT_BIN}" --headless --path . --script res://tools/quality/script_load_validation.gd

      - name: Check test surface coverage
        run: |
          "${GODOT_BIN}" --headless --path . --script res://tools/quality/test_surface_coverage.gd

      - name: Audit main menu localization
        run: |
          "${GODOT_BIN}" --headless --path . --script res://tools/quality/main_menu_localization_audit.gd

      - name: Audit main menu accessibility
        run: |
          "${GODOT_BIN}" --headless --path . --script res://tools/quality/main_menu_accessibility_audit.gd

      - name: Run tests
        run: |
          "${GODOT_BIN}" --headless --path . --script res://scripts/tests/run_all_tests.gd
